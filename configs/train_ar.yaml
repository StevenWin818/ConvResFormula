data:
  train_h5:
    - C:/Projects/LatexProject/ConvResFormula/datasets/train.h5 # 手写训练集
    - C:/Projects/LatexProject/ConvResFormula/datasets/synthetic.h5 # 合成训练集
    - C:/Projects/LatexProject/ConvResFormula/datasets/symbols96.h5 # 单字符训练集
    - C:/Projects/LatexProject/ConvResFormula/datasets/wiki_train_314k.h5 # wiki训练集
  eval_h5: C:/Projects/LatexProject/ConvResFormula/datasets/val.h5 # 验证/评估集
  tokenizer: C:/Projects/LatexProject/ConvResFormula/tokenizer_bpe.json # BPE 分词器
  max_area: 98304 # 图像动态缩放的面积上限

training:
  batch_size: 32 # 训练 batch 大小
  num_workers: 4 # 训练 DataLoader 线程数
  epochs: 30 # 总训练轮数
  seed: 42 # 随机种子
  mix_ratio: [4, 3, 1,2] # 多数据源采样比例，真实手写:合成手写:单字符手写:wiki
  epoch_samples: 524288 # 每个 epoch 的采样总数，<=0 表示全量
  bucket_mega_factor: 64 # 分桶 mega-batch 系数
  decoder_input_noise_ratio: 0.08 # 解码器输入随机 Token 替换概率（缓解曝光偏差）

optimization:
  encoder_lr: 6.0e-5 # 编码器学习率
  decoder_lr: 1.0e-5 # 解码器学习率
  weight_decay: 1.0e-2 # AdamW 权重衰减
  label_smoothing: 0.15 # 交叉熵标签平滑，提升泛化能力
  bow_weight: 1.0 # BoW 辅助损失权重
  ohem_ratio: 0.5 # OHEM 困难样本保留比例，设为 1.0 即不使用 OHEM
  enable_sigreg: true # 是否启用 SIGReg-like 正则化
  sigreg_weight: 0.08 # SIGReg-like 损失权重
  sigreg_num_projections: 1024 # SIGReg 随机投影次数
  sigreg_collapse_threshold: 0.03 # SIGReg embedding 坍塌检测阈值

augmentation:
  enable: true
  gaussian_noise:
    prob: 0.2
    sigma_min: 2.0
    sigma_max: 8.0
  contrast:
    prob: 0.3
    alpha_min: 0.7
    alpha_max: 1.2

augmentation_extreme:  
  enable: true  # 是否启用极限增强，极限增强包含更激烈的变换
  grid_distortion:
    prob: 0.5
    num_steps: 5
    distort_limit: 0.3
  elastic_transform:
    prob: 0.5
    alpha: 1.0
    sigma: 50.0
    alpha_affine: 50.0
  morphology:
    prob: 0.4
    kernel_size: 3
    iterations: 1
    ops: [erode, dilate]

scheduler:
  warmup_epochs: 1.0 # 线性预热轮数
  warmup_start_lr: 1.0e-7 # warmup 起始学习率
  eta_min: 1.0e-6 # 余弦退火最小学习率

logging:
  log_interval: 20 # 训练日志打印间隔(step)

eval:
  eval_interval: 1 # 每隔多少个 epoch 评估一次
  batch_size: 32 # 评估 batch 大小
  num_workers: 2 # 评估 DataLoader 线程数
  samples: 1024 # 每轮评估抽样数量，<=0 表示全量
  max_len: 160 # 评估解码最大长度
  amp_dtype: bf16 # 评估精度类型(fp16/bf16/fp32)
  use_gradient_checkpointing: True # 评估阶段默认启用视觉梯度检查点
  skip_eval: False # 是否跳过训练期评估

runtime:
  ckpt_dir: checkpoints/ar # checkpoint 输出目录
  log_dir: logs/ar_logs # 日志输出目录
  resume_ckpt: checkpoints\ar\epoch_20_stripped.pth # 恢复训练使用的 checkpoint
  resume: True # 是否默认启用断点恢复
  amp_dtype: fp16 # 训练精度类型(fp16/bf16/fp32)
  cudnn_benchmark: True # 启用 cudnn benchmark 模式以优化卷积性能
  channels_last: False # 启用 channels_last 内存格式
  kernel_warmup_batches: 0 # 训练前预热批次数，过大可能显著拉长首轮启动

cli_help:
  description: ConvNeXt-V2 + AttnRes 的 AR 训练脚本
  train_config: 训练配置文件路径
  model_config: 模型配置文件路径
  train_h5: 训练集 H5 列表，可传多个文件
  tokenizer: BPE Tokenizer JSON 路径
  eval_h5: 评估集 H5 路径
  max_area: 图像动态缩放最大面积
  d_model: 模型隐藏维度
  batch_size: 训练批大小
  num_workers: 训练 DataLoader 线程数
  epochs: 训练轮数
  seed: 随机种子
  mix_ratio: 多数据源采样比例，例如 1 1 5
  epoch_samples: 每个 epoch 总采样数，<=0 使用全量
  bucket_mega_factor: 分桶 mega-batch 系数
  encoder_lr: 视觉编码器学习率
  decoder_lr: 解码器学习率
  weight_decay: 权重衰减系数
  warmup_epochs: 学习率 warmup 轮数
  warmup_start_lr: warmup 起始学习率
  eta_min: 余弦退火最小学习率
  log_interval: 训练日志打印间隔(step)
  eval_interval: 每隔多少个 epoch 评估一次
  eval_batch_size: 评估批大小
  eval_num_workers: 评估 DataLoader 线程数
  eval_samples: 每轮评估抽样数量，<=0 表示全量
  eval_max_len: 评估解码最大长度
  amp_dtype: 训练精度类型(fp16/bf16/fp32)
  skip_eval: 仅训练不做评估
  enable_eval: 启用训练期评估
  ckpt_dir: checkpoint 输出目录
  log_dir: 日志输出目录
  resume_ckpt: 恢复训练的 checkpoint 路径
  resume: 从 resume_ckpt 恢复完整训练状态
  fresh_start: 不恢复断点，冷启动训练
