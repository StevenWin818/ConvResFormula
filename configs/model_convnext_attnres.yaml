model:
  d_model: 256
  use_learned_position_embeddings: true
  max_position_embeddings: 2048
  use_gradient_checkpointing: true # 启用梯度检查点以降低显存占用（会增加计算时间）
  checkpoint_segments: 1 # 对视觉编码器分成几段应用检查点 (1=整体, 2=前后层, 4=四分段)
  checkpoint_decoder_layers: false # 是否对解码器层应用检查点

vision_encoder:
  model_name: convnextv2_nano
  pretrained: true
  in_chans: 1
  drop_path_rate: 0.1

text_decoder:
  nhead: 8
  num_layers: 6
  dim_feedforward: 2048
  dropout: 0.1
